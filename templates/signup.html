<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EventPro — Sign Up</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    function toggleCategory() {
      var role = document.getElementById("roleSelect").value;
      var cat = document.getElementById("catGroup");
      cat.style.display = (role === "vendor") ? "block" : "none";
    }
  </script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card" style="max-width:520px;">
      <div class="auth-logo">
        <h1>⚡ EventPro</h1>
        <p>Create your account</p>
      </div>

      <div class="auth-tabs">
        <a href="/login" class="auth-tab">Login</a>
        <a href="/signup" class="auth-tab active">Sign Up</a>
        <a href="/admin_login" class="auth-tab">Admin</a>
      </div>

      {% if request.query_params.get("error") %}
      <div class="error-banner">⚠ {{ request.query_params.get("error") }}</div>
      {% endif %}

      <form action="/signup" method="POST">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select name="role" id="roleSelect" class="form-control" onchange="toggleCategory()">
            <option value="user">User</option>
            <option value="vendor">Vendor</option>
          </select>
        </div>
        <div class="form-group" id="catGroup" style="display:none;">
          <label class="form-label">Vendor Category</label>
          <select name="vendor_category" class="form-control">
            <option value="Catering">🍽 Catering</option>
            <option value="Florist">🌸 Florist</option>
            <option value="Decoration">🎨 Decoration</option>
            <option value="Lightning">💡 Lighting</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Create Account →</button>
      </form>

      <div class="auth-divider"><span>Already have an account?</span></div>
      <a href="/login" class="btn btn-outline btn-full">Sign In</a>
    </div>
  </div>
</body>
</html>
