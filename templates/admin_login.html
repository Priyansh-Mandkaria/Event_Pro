<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EventPro — Admin Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>⚡ EventPro</h1>
        <p style="color:#ef4444;">Admin Access Only</p>
      </div>

      <div class="auth-tabs">
        <a href="/login" class="auth-tab">Login</a>
        <a href="/signup" class="auth-tab">Sign Up</a>
        <a href="/admin_login" class="auth-tab active">Admin</a>
      </div>

      {% if request.query_params.get("error") %}
      <div class="error-banner">⚠ {{ request.query_params.get("error") }}</div>
      {% endif %}

      <div class="alert alert-info" style="margin-bottom:20px;">🔒 This portal is restricted to administrators only.</div>

      <form action="/admin_login" method="POST">
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input type="email" name="email" class="form-control" placeholder="admin@eventpro.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Admin Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Admin Sign In →</button>
      </form>
    </div>
  </div>
</body>
</html>
