<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EventPro — Success</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="success-overlay">
  <div class="success-card">
    <div class="success-icon">✅</div>
    <h2 style="font-size:1.8rem; margin-bottom:12px;">Orders Placed Successfully!</h2>
    <p style="color:var(--text-secondary); margin-bottom:32px;">Thank you for your purchase. We've split your request into individual orders for each vendor.</p>
    
    <div style="text-align:left; margin-bottom:24px;">
      <h3 style="font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:12px;">Your Order Summaries:</h3>
      {% for order in orders %}
      <div class="info-item" style="margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
        <div>
          <label>Order ID: #{{ order.id }}</label>
          <span style="font-size:0.8rem; color:var(--text-secondary);">Vendor ID: {{ order.vendor_id }}</span>
        </div>
        <div style="text-align:right;">
          <div style="font-weight:700; color:var(--accent-orange);">₹{{ order.total_amount }}</div>
          <span class="badge badge-orange">Pending</span>
        </div>
      </div>
      {% endfor %}
    </div>

    <div style="display:flex; gap:12px; justify-content:center;">
      <a href="/user/order_status" class="btn btn-primary">Track All Orders</a>
      <a href="/user" class="btn btn-outline">Back to Home</a>
    </div>
  </div>
</body>
</html>
